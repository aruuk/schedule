<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Schedule Calendar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 16px;
        }

        th, td {
            border: 1px solid #888;
            padding: 8px;
            text-align: center;
            vertical-align: top;
        }

        th {
            background: #eef;
        }

        .lesson {
            margin-bottom: 8px;
            padding: 6px;
            border: 1px solid #bbb;
            border-radius: 6px;
            background: #fafafa;
        }

        .subject {
            font-weight: bold;
        }

        .nav-tabs {
            margin-bottom: 1em;
        }

        .nav-tabs a {
            display: inline-block;
            margin-right: 0.5em;
            text-decoration: none;
            padding: 6px 10px;
            background: #ddd;
            border-radius: 6px;
            color: #000;
        }

        .nav-tabs a.active {
            background: #8eb6ff;
        }

        .actions a {
            display: inline-block;
            margin-right: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<h1>Schedule Calendar</h1>

<div class="nav-tabs">
    <a th:each="d : ${days}"
       th:href="@{/(day=${d})}"
       th:text="${d}"
       th:classappend="${d == selectedDay ? ' active' : ''}">
        MONDAY
    </a>
</div>

<p class="actions">
    <a th:href="@{/group/add}">➕ Add Group</a>
    <a th:href="@{/teacher/add}">➕ Add Teacher</a>
    <a th:href="@{/room/add}">➕ Add Room</a>
    <a th:href="@{/schedule/add}">➕ Add Lesson</a>
</p>

<table>
    <tr>
        <th>Group</th>
        <th>Lesson 1</th>
        <th>Lesson 2</th>
        <th>Lesson 3</th>
        <th>Lesson 4</th>
        <th>Lesson 5</th>
    </tr>

    <tr th:each="g : ${groups}">
        <td th:text="${g.name}">Group Name</td>

        <td th:each="lessonNum : ${#numbers.sequence(1,5)}">
            <th:block th:each="s : ${schedules}">
                <div th:if="${s.group.id == g.id and s.lesson == lessonNum}" class="lesson">
                    <span class="subject" th:text="${s.subject}">Subject</span><br>
                    <span th:text="${s.teacher.name}">Teacher</span><br>
                    <span th:text="${s.room.number}">Room</span><br>
                    <a th:href="@{'/schedule/edit/' + ${s.id}}">Edit</a>
                    <form th:action="@{'/schedule/delete/' + ${s.id}}" method="post" style="display:inline;">
                        <button type="submit">Del</button>
                    </form>
                </div>
            </th:block>
        </td>
    </tr>
</table>
</body>
</html>
